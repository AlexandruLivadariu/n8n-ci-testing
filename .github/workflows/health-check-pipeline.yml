name: n8n Health Check Pipeline

on:
  workflow_dispatch:
  # Uncomment to enable scheduled health checks (daily at 8 AM)
  # schedule:
  #   - cron: '0 8 * * *'

concurrency:
  group: n8n-health-check
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      N8N_TEST_API_KEY: ${{ secrets.N8N_TEST_API_KEY }}
      N8N_DB_PASSWORD: ${{ secrets.N8N_DB_PASSWORD }}
      NO_PROXY: localhost,127.0.0.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          cd scripts
          chmod +x start-test-env.sh
          ./start-test-env.sh

      - name: Setup owner and API key
        env:
          N8N_HOST: http://localhost:5679
        run: |
          cd scripts
          chmod +x import-test-workflows.sh
          ./import-test-workflows.sh || echo "Workflow import failed - continuing with health checks"

      - name: Load auto-created API key
        run: |
          if [ -z "$N8N_TEST_API_KEY" ] && [ -f /tmp/n8n_test_api_key ]; then
            echo "Using auto-created API key from setup step"
            echo "N8N_TEST_API_KEY=$(cat /tmp/n8n_test_api_key)" >> $GITHUB_ENV
          fi

      - name: Run health check tests
        id: health_tests
        continue-on-error: true
        run: |
          cd tests
          chmod +x runner.sh
          ./runner.sh --mode=health-check

      - name: Generate health summary
        id: summary
        if: always()
        run: |
          # Find the latest test report (timestamped filenames)
          LATEST_REPORT=$(ls -t tests/results/test_report_*.json 2>/dev/null | head -1)

          if [ -n "$LATEST_REPORT" ] && [ -f "$LATEST_REPORT" ]; then
            echo "Reading report: $LATEST_REPORT"
            TOTAL=$(jq -r '.summary.total // 0' "$LATEST_REPORT")
            PASSED=$(jq -r '.summary.passed // 0' "$LATEST_REPORT")
            FAILED=$(jq -r '.summary.failed // 0' "$LATEST_REPORT")
            CRITICAL=$(jq -r '.summary.critical_failed // 0' "$LATEST_REPORT")

            echo "total=${TOTAL}" >> $GITHUB_OUTPUT
            echo "passed=${PASSED}" >> $GITHUB_OUTPUT
            echo "failed=${FAILED}" >> $GITHUB_OUTPUT
            echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT

            if [ "$CRITICAL" -gt 0 ] 2>/dev/null; then
              echo "status=CRITICAL" >> $GITHUB_OUTPUT
            elif [ "$FAILED" -gt 0 ] 2>/dev/null; then
              echo "status=WARNING" >> $GITHUB_OUTPUT
            else
              echo "status=HEALTHY" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=UNKNOWN" >> $GITHUB_OUTPUT
          fi

      - name: Send health notification
        if: always() && env.SMTP_HOST != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "n8n Health Check: ${{ steps.summary.outputs.status == 'HEALTHY' && 'HEALTHY' || steps.summary.outputs.status == 'WARNING' && 'WARNING' || 'CRITICAL' }}"
          to: ${{ secrets.NOTIFICATION_RECIPIENTS }}
          from: n8n Automation <${{ secrets.SMTP_USER }}>
          body: |
            n8n Health Check Results
            ========================

            Date: $(date)
            Status: ${{ steps.summary.outputs.status }}

            Test Summary:
            - Total Tests: ${{ steps.summary.outputs.total }}
            - Passed: ${{ steps.summary.outputs.passed }}
            - Failed: ${{ steps.summary.outputs.failed }}
            - Critical Failures: ${{ steps.summary.outputs.critical }}

            ${{ steps.summary.outputs.status == 'CRITICAL' && 'CRITICAL ISSUES DETECTED - Immediate attention required!' || steps.summary.outputs.status == 'WARNING' && 'Some tests failed - Review recommended' || 'All systems operational' }}

            View full results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Log notification status
        if: always()
        run: |
          echo "Health Check Status: ${{ steps.summary.outputs.status }}"
          echo "Total: ${{ steps.summary.outputs.total }}, Passed: ${{ steps.summary.outputs.passed }}, Failed: ${{ steps.summary.outputs.failed }}"
          echo "View results in artifacts or configure SMTP secrets for email notifications"

      - name: Cleanup - Stop test environment
        if: always()
        run: |
          cd scripts
          chmod +x stop-test-env.sh
          ./stop-test-env.sh

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: |
            tests/results/*.json
          retention-days: 30

      - name: Fail on critical issues
        if: steps.summary.outputs.status == 'CRITICAL'
        run: |
          echo "Critical health check failures detected: ${{ steps.summary.outputs.critical }} critical failure(s)"
          exit 1
